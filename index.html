<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skincare E-Commerce</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/reset.css">
  <script src="/js/common.js" defer></script>
</head>
<body>
  <header class="l-header">
    <div class="l-inner">
      <h1 class="wrap-img logo"><img src="/images/logo.png" alt=""></h1>
      <div class="wrap-menu" data-cmnjs-accordion-wrap>
        <p class="wrap-img img-menu" data-cmnjs-accordion-btn><img src="/images/icon-category.png" alt=""></p>
        <div class="wrap-area-menu" data-cmnjs-accordion-area>
          <ul class="list-link-menu">
            <li><a class="link active" href="#">Home</a></li>
            <li><a class="link" href="#">Shop</a></li>
            <li><a class="link" href="#">Spa</a></li>
            <li><a class="link" href="#">About</a></li>
            <li><a class="link" href="#">Contact</a></li>
          </ul>
          <ul class="list-user-control">
            <li><a href="#"><img src="/images/icon-bag.svg" alt=""></a></li>
            <li><a href="#"><img src="/images/icon-heart.svg" alt=""></a></li>
            <li><a href="#"><img src="/images/icon-user.svg" alt=""></a></li>
          </ul>
        </div>
      </div>
    </div>
  </header>
  <main>
    <div class="l-inner">
      <div class="wrap-main-top">
        <ul class="list-category">
          <li><a href="#">Women</a></li>
          <li><a href="#">Men</a></li>
          <li><a href="#">Kiddies</a></li>
          <li><a href="#">New</a></li>
          <li><a href="#">Popular</a></li>
        </ul>
        <p class="wrap-search"><input type="text"></p>
      </div>
      <section class="wrap-sect">
        <div class="wrap-hdg">
          <h2 class="hdg-lv2">Discover Our Best-Sellers</h2>
          <p class="txt-link"><a href="#">View all</a></p>
        </div>
        <ul class="list-product">
          <li>
            <div class="wrap-product">
              <p class="save"><a href="#">Save</a></p>
              <p class="type">Best Seller</p>
              <p class="rating"></p>
              <p class="wrap-img img-product"><img src="/images/img-product01.png" alt=""></p>
              <div class="cnt">
                <p class="name">X5 Extreme Body Lotion</p>
                <p class="price"><del>₦35,000</del>₦30,000</p>
              </div>
            </div>
          </li>
        </ul>
      </section>
    </div>
  </main>
</body>
</html>
